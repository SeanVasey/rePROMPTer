            <path d="
              M 430 380 H 495 
              C 535 380, 565 390, 582 412 
              C 598 434, 600 452, 598 472 
              C 594 495, 578 508, 555 515 
              C 540 518, 520 518, 500 518 
              H 430 Z" />
          </g>
        </svg>
    </div>
</body>
</html>