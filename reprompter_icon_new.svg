          <circle cx="165" cy="500" r="10" fill="#FA5D60" />

          <rect x="808" y="470" width="46" height="52" rx="4" fill="#FA5D60" />
          <rect x="780" y="442" width="46" height="52" rx="4" fill="#FFFFFF" stroke="#1C1E21" stroke-width="9" stroke-linejoin="round" />

          <g fill="#FFFFFF" stroke="#1C1E21" stroke-width="9" stroke-linejoin="round">
            <path d="M 442 790 H 555 A 16 16 0 0 1 571 806 V 848 A 16 16 0 0 1 555 864 H 518 L 500 894 L 482 864 H 442 A 16 16 0 0 1 426 848 V 806 A 16 16 0 0 1 442 790 Z" />
          </g>
          <line x1="458" y1="818" x2="537" y2="818" stroke="#1C1E21" stroke-width="7" stroke-linecap="round" />
          <line x1="458" y1="840" x2="507" y2="840" stroke="#1C1E21" stroke-width="7" stroke-linecap="round" />

          <defs>
            <clipPath id="r-clip" clipPathUnits="userSpaceOnUse">
              <path d="
                M 330 290 H 510 
                C 570 290, 620 295, 655 325 
                C 695 358, 700 400, 700 435 
                C 700 475, 690 510, 665 535 
                C 640 560, 605 570, 565 572 
                L 730 720 H 615 L 450 580 H 430 V 720 H 330 Z 
                M 430 518 L 500 518 
                C 520 518, 540 518, 555 515 
                C 578 508, 594 495, 598 472 
                C 600 452, 598 434, 582 412 
                C 565 390, 535 380, 495 380 
                L 430 380 Z" clip-rule="evenodd" />
            </clipPath>
          </defs>

          <g clip-path="url(#r-clip)">
            <rect x="200" y="200" width="600" height="600" fill="#FA5D60" />
            <polygon points="0,-40 1000,960 1000,1130 0,130" fill="#FFFFFF" />
            <line x1="0" y1="-40" x2="1000" y2="960" stroke="#1C1E21" stroke-width="12" />
            <line x1="0" y1="130" x2="1000" y2="1130" stroke="#1C1E21" stroke-width="12" />
          </g>

          <g fill="none" stroke="#1C1E21" stroke-width="12" stroke-linejoin="round">
            <path d="
              M 330 290 H 510 
              C 570 290, 620 295, 655 325 
              C 695 358, 700 400, 700 435 
              C 700 475, 690 510, 665 535 
              C 640 560, 605 570, 565 572 
