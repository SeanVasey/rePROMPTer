<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Preview</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f5;
        }
        .svg-container {
            width: 90vmin;
            height: 90vmin;
            max-width: 800px;
            max-height: 800px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="svg-container">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%">
          <rect width="100%" height="100%" fill="#FFFFFF" />

          <g stroke="#1C1E21" stroke-width="7" fill="none">
            <circle cx="340" cy="155" r="11" />
            <circle cx="655" cy="155" r="11" />
            <circle cx="840" cy="335" r="11" />
            <circle cx="840" cy="660" r="11" />
            <circle cx="660" cy="840" r="11" />
            <circle cx="340" cy="840" r="11" />
            <circle cx="160" cy="660" r="11" />
            <circle cx="160" cy="340" r="11" />
          </g>

          <g stroke="#1C1E21" stroke-width="7" stroke-linecap="round">
            <line x1="188" y1="282" x2="215" y2="268" />
            <path d="M 790 248 L 810 268 M 790 268 L 810 248" />
            <path d="M 790 718 L 810 738 M 790 738 L 810 718" />
            <path d="M 285 808 L 305 828 M 285 828 L 305 808" />
          </g>

          <g stroke="#FA5D60" stroke-width="6" stroke-linecap="round">
            <path d="M 228 212 H 252 M 240 200 V 224" />
            <path d="M 738 218 H 762 M 750 206 V 230" />
            <path d="M 233 778 H 257 M 245 766 V 790" />
          </g>
          <circle cx="750" cy="790" r="9" fill="none" stroke="#FA5D60" stroke-width="5" />

          <g stroke="#B0B2B4" stroke-width="5" stroke-linecap="round">
            <path d="M 698 188 H 722 M 710 176 V 200" />
          </g>
          <circle cx="205" cy="725" r="4" fill="#B0B2B4" />

          <g stroke="#1C1E21" stroke-width="9" stroke-linejoin="round">
            <rect x="479" y="100" width="42" height="58" rx="5" ry="5" fill="#FA5D60" />
            <polygon points="479,158 521,158 500,192" fill="#1C1E21" />
          </g>

          <g stroke="#1C1E21" stroke-width="9" fill="#FFFFFF">
            <circle cx="165" cy="500" r="44" />
            <circle cx="165" cy="500" r="23" />
